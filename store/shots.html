<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>tapto — store shots</title>
<style>
  /* ── tapto side-panel styles (light only, copied from extension/sidepanel.html) ── */
  .panel {
    --bg:#fbfbfa; --surface:#fff; --subtle:#f4f3f0; --ink:#15140f; --muted:#6a685f;
    --faint:#83817a; --line:#e7e5df; --line-strong:#d8d5cc; --r:11px; --pad:16px;
    --font:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;
    --mono:ui-monospace,SFMono-Regular,'SF Mono',Menlo,monospace;
    background:var(--bg); color:var(--ink); font-family:var(--font); font-size:14px; line-height:1.5;
  }
  .panel * { box-sizing:border-box; }
  .panel h2 { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin:0 0 9px; }
  .panel .appbar { display:flex; align-items:center; justify-content:space-between; padding:12px var(--pad); background:var(--bg); border-bottom:1px solid var(--line); }
  .panel .logo { display:flex; align-items:center; gap:8px; font-size:16px; font-weight:650; letter-spacing:-.02em; }
  .panel .acct { display:flex; align-items:center; gap:10px; font-size:12px; color:var(--muted); }
  .panel main { padding:var(--pad); }
  .panel label { display:block; font-weight:550; margin:0 0 5px; }
  .panel label .hint { color:var(--muted); font-weight:400; }
  .panel input { width:100%; font:inherit; color:var(--ink); background:var(--surface); border:1px solid var(--line-strong); border-radius:var(--r); padding:10px 12px; min-height:40px; }
  .panel .field + .field { margin-top:13px; }
  .panel .preview { font-family:var(--mono); font-size:12px; color:var(--muted); margin:6px 2px 0; }
  .panel .preview b { color:var(--ink); }
  .panel .btn { display:inline-flex; align-items:center; justify-content:center; gap:7px; width:100%; min-height:44px; padding:0 16px; border-radius:var(--r); border:1px solid transparent; font:inherit; font-weight:600; }
  .panel .btn.primary { background:var(--ink); color:var(--bg); }
  .panel .btn.ghost { background:var(--surface); color:var(--ink); border-color:var(--line-strong); }
  .panel .actions { display:flex; gap:8px; margin-top:16px; }
  .panel .seg { display:flex; gap:3px; background:var(--subtle); border:1px solid var(--line); border-radius:var(--r); padding:3px; }
  .panel .seg button { flex:1; min-height:36px; border:0; border-radius:8px; background:transparent; color:var(--muted); font:inherit; font-weight:550; }
  .panel .seg button[aria-pressed="true"] { background:var(--surface); color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.12); }
  .panel .list { list-style:none; margin:0 0 22px; padding:0; }
  .panel .row { display:flex; gap:7px; align-items:stretch; }
  .panel .row + .row { margin-top:7px; }
  .panel .row .open { flex:1; display:flex; align-items:center; justify-content:space-between; gap:10px; min-height:44px; padding:8px 12px; text-align:left; background:var(--surface); border:1px solid var(--line); border-radius:var(--r); color:var(--ink); overflow:hidden; }
  .panel .row .s { font-family:var(--mono); font-weight:600; flex:none; }
  .panel .row .d { color:var(--muted); font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .panel .del { flex:none; width:44px; border:1px solid var(--line); border-radius:var(--r); background:var(--surface); color:var(--muted); font-size:16px; }
  .panel .editor { border-top:1px solid var(--line); padding-top:18px; }
  .panel .result { margin-top:20px; border-top:1px solid var(--line); padding-top:16px; }
  .panel #qr { width:160px; height:160px; margin:10px auto 12px; background:#fff; padding:8px; border:1px solid var(--line); border-radius:var(--r); }
  .panel #qr svg { width:100%; height:100%; display:block; }
  .panel .urlrow { display:flex; gap:8px; align-items:stretch; }
  .panel .urlrow code { flex:1; font-family:var(--mono); font-size:11px; word-break:break-all; color:var(--ink); background:var(--subtle); border:1px solid var(--line); border-radius:var(--r); padding:9px 11px; }
  .panel .urlrow .btn { width:auto; min-height:0; padding:0 16px; }
  .panel .status { color:var(--muted); font-size:12.5px; margin:12px 2px 0; }

  /* ── store frame (1280×800) ── */
  * { margin:0; box-sizing:border-box; }
  body { width:1280px; height:800px; overflow:hidden;
         font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
         background:linear-gradient(135deg,#f3efe7 0%,#e9e3d7 100%); display:flex; align-items:center; }
  .stage { display:flex; align-items:center; gap:64px; padding:0 80px; width:100%; }
  .copy { flex:1; max-width:560px; }
  .copy .mark { display:flex; align-items:center; gap:9px; font-size:18px; font-weight:650; letter-spacing:-.02em; color:#15140f; margin-bottom:26px; }
  .copy h1 { font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif; font-weight:600;
             font-size:48px; line-height:1.08; letter-spacing:-.02em; color:#15140f; margin-bottom:18px; }
  .copy p { font-size:20px; line-height:1.5; color:#5c5950; max-width:460px; }
  .device { width:392px; flex:none; border-radius:20px; overflow:hidden; background:#fbfbfa;
            box-shadow:0 30px 70px rgba(60,50,30,.22), 0 4px 14px rgba(60,50,30,.12); border:1px solid rgba(0,0,0,.06); }
  .device .panel { height:660px; overflow:hidden; }
</style>
</head>
<body>
<div class="stage">
  <div class="copy">
    <div class="mark" id="mark"></div>
    <h1 id="headline"></h1>
    <p id="sub"></p>
  </div>
  <div class="device"><div class="panel" id="panel"></div></div>
</div>

<script src="../extension/vendor/qrcode.js"></script>
<script>
const MARK = `<svg width="22" height="22" viewBox="0 0 128 128" aria-hidden="true">
  <rect width="128" height="128" rx="28" fill="#15140f"/>
  <g fill="none" stroke="#fbfbfa" stroke-width="7.5" stroke-linecap="round">
    <path d="M48.7 47.7 A22 22 0 0 1 48.7 80.3"/><path d="M58.1 37.3 A36 36 0 0 1 58.1 90.7"/>
    <path d="M67.5 26.9 A50 50 0 0 1 67.5 101.1"/></g>
  <circle cx="40" cy="64" r="7.5" fill="#fbfbfa"/></svg>`;
const SVGLOGO = MARK; // same mark, smaller in appbar
const HEADER = `<div class="appbar"><span class="logo">${SVGLOGO}<span style="margin-left:-2px">tapto</span></span>
  <span class="acct">@jonasneves <button class="btn ghost" style="width:auto;min-height:30px;padding:0 12px;font-weight:500">Sign out</button></span></div>`;

function rows(items) {
  return `<ul class="list">${items.map(([s,d]) =>
    `<li class="row"><button class="open"><span class="s">#${s}</span><span class="d">${d}</span></button><button class="del">×</button></li>`).join('')}</ul>`;
}

const SCENES = {
  create: {
    headline: 'Tags you can repoint anytime.',
    sub: 'Point an NFC tag or QR code at a link — and change where it goes whenever you like, without rewriting the tag.',
    panel: HEADER + `<main>
      <h2>Your tags</h2>
      ${rows([['desk','https://neves.cloud'],['wifi','note · Guest Wi-Fi'],['profile','https://github.com/jonasneves']])}
      <div class="editor">
        <h2>New tag</h2>
        <div class="field"><label>Slug <span class="hint">— the bit after #</span></label>
          <input value="menu"><p class="preview">neves.cloud/tapto/#964ac02a…/<b>menu</b></p></div>
        <div class="field"><label>What happens</label>
          <div class="seg"><button aria-pressed="true">Open a link</button><button aria-pressed="false">Show a note</button></div></div>
        <div class="field"><label>Link</label><input value="https://my-cafe.example/menu"></div>
        <div class="actions"><button class="btn primary">Save tag</button></div>
      </div></main>`,
  },
  share: {
    headline: 'Print the QR once. Change the link forever.',
    sub: 'Every tag gives you a URL and a QR to print. Edit the destination later and the same tag follows.',
    qr: 'https://neves.cloud/tapto/#964ac02a2a06dfb6986b3942fb6ea78d/menu',
    panel: HEADER + `<main>
      <h2>Your tags</h2>
      ${rows([['menu','https://my-cafe.example/menu'],['wifi','note · Guest Wi-Fi']])}
      <div class="editor">
        <h2>Edit #menu</h2>
        <p class="status" style="margin-top:0">Saved.</p>
        <div class="result" style="margin-top:8px; border-top:0; padding-top:0">
          <p class="status" style="margin:0 0 2px">Write this to your NFC tag, or print the QR.</p>
          <div id="qr"></div>
          <div class="urlrow"><code>neves.cloud/tapto/#964ac02a…/menu</code><button class="btn ghost">Copy</button></div>
        </div>
      </div></main>`,
  },
};

const scene = new URLSearchParams(location.search).get('scene') || 'create';
const s = SCENES[scene];
document.getElementById('mark').innerHTML = MARK + '<span>tapto</span>';
document.getElementById('headline').textContent = s.headline;
document.getElementById('sub').textContent = s.sub;
document.getElementById('panel').innerHTML = s.panel;
if (s.qr) { const q = qrcode(0,'M'); q.addData(s.qr); q.make();
  document.getElementById('qr').innerHTML = q.createSvgTag({ scalable:true, margin:0 }); }
</script>
</body>
</html>
