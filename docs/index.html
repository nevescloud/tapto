<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>tapto — reprogrammable NFC &amp; QR tags</title>
<meta name="description" content="One tag, any destination, change it anytime — without rewriting the tag." />
<meta name="color-scheme" content="light dark" />
<!-- Anti-flash: on a real tag tap (#…) hide the landing before first paint. -->
<script>if (location.hash.length > 1) document.documentElement.classList.add('resolving');</script>
<style>
  :root { --bg:#fbfbfa; --ink:#15140f; --muted:#6a685f; --line:#e7e5df; --card:#fff; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0d0d0c; --ink:#ededea; --muted:#8a877e; --line:#262521; --card:#161614; }
  }
  * { box-sizing:border-box; }
  html.resolving #landing { display:none; }
  html:not(.resolving) #app { display:none; }
  html,body { margin:0; min-height:100%; }
  body { background:var(--bg); color:var(--ink); font-size:16px; line-height:1.55;
         font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
         -webkit-font-smoothing:antialiased; -webkit-text-size-adjust:100%; }
  a { color:inherit; }

  #landing { min-height:100dvh; display:grid; place-items:center; padding:32px; }
  .card { width:100%; max-width:25rem; text-align:center; }
  .brand { font-size:1.5rem; font-weight:650; letter-spacing:-.02em; }
  h1 { font-size:1.18rem; font-weight:600; letter-spacing:-.01em; margin:22px 0 8px; }
  p.lede { color:var(--muted); margin:0 0 26px; }
  .cta { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .btn { display:inline-flex; align-items:center; gap:7px; font:inherit; font-weight:500;
         padding:11px 18px; border-radius:10px; border:1px solid var(--ink); cursor:pointer; text-decoration:none; }
  .btn-primary { background:var(--ink); color:var(--bg); }
  .btn-primary:hover { opacity:.88; }
  .btn-ghost { border-color:var(--line); color:var(--ink); }
  .btn-ghost:hover { border-color:var(--muted); }
  .badge::after { content:"soon"; font-size:.6rem; text-transform:uppercase; letter-spacing:.05em;
                  margin-left:2px; opacity:.6; }
  .demo { margin-top:26px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:.82rem; color:var(--muted); }
  .demo b { color:var(--ink); }
  .demo a { text-decoration:underline; text-underline-offset:2px; }
  footer { margin-top:30px; font-size:.8rem; color:var(--muted); }
  footer a { text-decoration:none; }

  #app { min-height:100dvh; display:grid; place-items:center; text-align:center; padding:24px; }
  .spin { width:26px; height:26px; border:3px solid var(--line); border-top-color:var(--ink);
          border-radius:50%; animation:r .8s linear infinite; margin:0 auto; }
  @keyframes r { to { transform:rotate(360deg); } }
  @media (prefers-reduced-motion: reduce){ .spin{ animation:none; } }
  #app .body { white-space:pre-wrap; text-align:left; background:var(--card); border:1px solid var(--line);
               border-radius:12px; padding:16px 18px; margin-top:14px; max-width:34rem; }
  #app h1 { font-size:1.4rem; margin:0 0 .25rem; }
  .muted { color:var(--muted); }
</style>
</head>
<body>

<div id="landing">
  <div class="card">
    <div class="brand">tapto.</div>
    <h1>Reprogrammable NFC &amp; QR tags.</h1>
    <p class="lede">One tag, any destination — change where it points anytime, without rewriting the tag.</p>
    <div class="cta">
      <a class="btn btn-primary badge" href="#" aria-disabled="true">Get the creator</a>
      <a class="btn btn-ghost" href="https://github.com/nevescloud/tapto">Source</a>
    </div>
    <div class="demo">neves.cloud/tapto/#964ac02a…/<b>desk</b> · <a href="#964ac02a2a06dfb6986b3942fb6ea78d/desk">tap it</a></div>
    <footer><a href="https://neves.cloud">neves.cloud</a></footer>
  </div>
</div>

<main id="app"><div class="spin" aria-hidden="true"></div></main>
<p role="status" aria-live="polite" id="sr" class="muted" style="position:absolute;left:-9999px">Loading…</p>

<script type="module">
// Resolver. A tag bakes  neves.cloud/tapto/#<gistId>/<slug>  — the fragment names the
// gist (the map) and the entry. Keyed on the gist ID, not the username: gist IDs are
// immutable across account renames and edits, so a baked tag stays valid forever. One
// direct GET /gists/<id> (content inline) — no list/scan, no per_page cap. This page
// only READS; editing happens in the creator extension.
const GIST_FILE = 'tapto.json';   // preferred file in the gist (falls back to the first file)

const app = document.getElementById('app');
const sr  = document.getElementById('sr');
const say = (m) => { sr.textContent = m; };
const esc = (s) => String(s).replace(/[&<>"']/g, c =>
  ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

// #<gistId>/<slug> → {gistId, slug}; empty → null (landing).
function parseHash() {
  const h = decodeURIComponent(location.hash.replace(/^#/, '').split('?')[0]).replace(/^\/+|\/+$/g, '');
  if (!h) return null;
  const p = h.split('/');
  return { gistId: p[0], slug: p.slice(1).join('/') };
}

async function loadTags(gistId) {
  // no-store on every gist read: a reprogrammed tag must resolve fresh, never a
  // cached (stale) destination from GitHub's max-age. (The HTML shell can cache;
  // the destination never lives in it.)
  const r = await fetch(`https://api.github.com/gists/${gistId}`,
    { cache: 'no-store', headers: { Accept: 'application/vnd.github+json' } });
  if (!r.ok) throw new Error('gist');
  const g = await r.json();
  const f = g.files && (g.files[GIST_FILE] || Object.values(g.files)[0]);
  if (!f) throw new Error('empty');
  const text = f.truncated ? await (await fetch(f.raw_url, { cache: 'no-store' })).text() : f.content; // inline unless >1MB
  return JSON.parse(text);
}

const msg = (title, detail) => { say(title);
  app.innerHTML = `<div><h1>${esc(title)}</h1><p class="muted">${esc(detail||'')}</p></div>`; };

// http(s) → replace the tab (the page becomes the destination, no leftover tab).
// Any other scheme (spotify:, tel:, app deep link) → a user-tapped Open: a gesture
// softens iOS's app-launch prompt, and since a user-opened tab can't be closed by
// script we attempt window.close() then leave a tidy "you can close this" state.
function openUrl(url) {
  if (/^https?:/i.test(url)) {
    say('Redirecting…');
    app.innerHTML = `<div><div class="spin" aria-hidden="true"></div>
      <p class="muted" style="margin-top:14px">Taking you to <a href="${esc(url)}">${esc(url)}</a>…</p></div>`;
    location.replace(url);
    return;
  }
  say('Ready to open');
  app.innerHTML = `<div>
    <button id="open" style="font:inherit;font-weight:600;padding:13px 26px;border-radius:11px;
      border:1px solid var(--ink);background:var(--ink);color:var(--bg);cursor:pointer">Open →</button>
    <p class="muted" style="margin-top:14px;word-break:break-all">${esc(url)}</p></div>`;
  document.getElementById('open').onclick = () => {
    location.href = url;            // fire the app (iOS may still confirm)
    say('Opening…');
    setTimeout(() => {
      try { window.close(); } catch {}   // best-effort; ignored for user-opened tabs
      app.innerHTML = `<div><h1>Opening…</h1><p class="muted">You can close this tab.</p></div>`;
    }, 600);
  };
}

async function resolve() {
  const h = parseHash();
  if (!h) { document.documentElement.classList.remove('resolving'); return; } // → landing
  document.documentElement.classList.add('resolving');
  if (!h.slug) return msg('Incomplete tag link', 'This link is missing its tag name — it should look like …/#<gist-id>/<slug>.');
  let tags;
  try { tags = await loadTags(h.gistId); }
  catch { return msg('Can’t reach tags', 'Couldn’t load this tag map. Try again in a moment.'); }
  const tag = (tags.tags || tags)[h.slug];
  if (!tag) return msg('Unknown tag', `No destination set for “${h.slug}”.`);
  if (tag.type === 'page') { say(tag.title || 'Page');
    app.innerHTML = `<div>${tag.title?`<h1>${esc(tag.title)}</h1>`:''}<div class="body">${esc(tag.body||'')}</div></div>`; return; }
  if (tag.url) return openUrl(tag.url);
  msg('Misconfigured tag', `“${h.slug}” has no url or page body.`);
}
addEventListener('hashchange', resolve);
resolve();
</script>
</body>
</html>
